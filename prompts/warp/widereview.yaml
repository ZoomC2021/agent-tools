name: WideReview
description: Wide fan-out code review across four model CLIs (Grok Composer 2.5 via grok, Cursor Grok 4.5 High via cursor-agent, GPT-5.6 Sol via codex, and Kimi K3 via cmd), consolidated into a vote-weighted report. Diff mode (default) or full-codebase mode.
tags:
  - ai
  - review
  - git
command: |
  Run a wide fan-out code review across four independent model CLIs in parallel, then consolidate the findings. You are the orchestrator only — you do not review the code yourself. Use this host harness's active or primary model for orchestration; do not select or override the orchestrator model.

  Modes:
  - Diff (default): review uncommitted changes.
  - Full (when the user says "full codebase", "--full", or passes a path): review the entire application source (or just that path).

  Lanes (each optional; skip any whose CLI is missing or unauthenticated, continue with the rest, require at least one):
  - A: `grok -p "<prompt>" -m grok-composer-2.5-fast --always-approve --cwd <root>`
  - B: `cursor-agent -p --model cursor-grok-4.5-high --mode ask --trust --workspace <root> "<prompt>"`
  - C: `codex exec --ephemeral -s read-only --skip-git-repo-check -C <root> -m gpt-5.6-sol "<prompt>"`
  - D: `( cd <root> && cmd -p "<prompt>" --model moonshotai/Kimi-K3 --permission-mode plan --max-turns 30 )`

  Workflow:
  1. Gather context for the mode:
     - Diff: `git add -N .` (so untracked files show up), then `git diff HEAD -U40`, `git diff --cached -U40`, `git status --short` -> temp bundle file. Stop if empty. Use timeout 480 per lane.
     - Full: build a deterministic file manifest with `git ls-files` (fallback `find`), stripping vendor/build noise (.venv, venv, node_modules, dist, build, .git, site-packages, __pycache__, vendor, third_party, migrations, lock files). Optional path arg narrows scope. If >150 files, warn and tell lanes to surface only highest-value findings. Use timeout 720 per lane.
  2. Pre-flight: detect available lanes with `command -v` (grok, cursor-agent, codex, cmd). No per-lane configuration is required.
  3. Define a portable `wr_timeout` wrapper (GNU timeout -> gtimeout -> shell watchdog with kill -9) because stock macOS has no timeout(1). Launch each available lane in the background with `wr_timeout`, feeding the same strict-format prompt, and redirect stdin from `/dev/null` so headless CLIs do not hang on an open orchestrator pipe. For FULL mode the prompt must be firmly anchored: "Review ONLY the files in the manifest at <path>. Do NOT run git commands, do NOT explore unrelated directories, do NOT describe your plan or summarize your work." Output contract for both modes: "For each issue output exactly one pipe-delimited line: SEVERITY | CATEGORY | file:line | description | CONFIDENCE (SEVERITY: Critical|Warning|Suggestion; CATEGORY: Logic|Security|Performance|Regression|Style|Other; CONFIDENCE: High|Medium|Low). If none, output NO_ISSUES. No prose, no code fences." Each lane writes to its own output file.
  4. Wait for all lanes; record each exit code (0=ok, 124 or 137=timeout, other=failed).
  5. Parse each output: strip code fences and narration, keep only conforming pipe-delimited lines, normalize paths.
  6. Consolidate by counting how many lanes report each file:line:category signature: 3-4 lanes = Strong Consensus, 2 = Consensus, 1 high-confidence = Exclusive, 1 medium/low = Lower Confidence, conflicting at same location = Divergent. Preserve each lane's original severity. Never auto-resolve divergences.

  Output: a summary with the mode, bucket counts, and a per-lane status table (model + status + finding count + lanes used k/4), then findings grouped by bucket with agreement ratio and source lanes, consensus first.

  Constraints:
  - Prefer concrete, actionable findings with file:line references.
  - Report "No issues found" if all available lanes are clean.
  - Mention any lane that was skipped, timed out, failed, or returned only narration.
  - If all lanes fail, suggest the standard review workflow instead.
