name: Agent Browser
description: Browser automation with the agent-browser CLI for navigating pages, interacting with elements, extracting data, screenshots, QA, Electron/Slack, and cloud browser sessions.
tags:
  - browser
  - automation
  - agent-browser
arguments:
  - name: scope
    description: Browser task, URL, app, or automation goal.
    default_value: .
command: |
  Apply the Agent Browser workflow to `{{scope}}`.

  # Agent Browser

  Use `agent-browser` for browser automation tasks: navigating websites, inspecting pages, clicking or filling controls, extracting data, taking screenshots/PDFs, testing web apps, automating Electron/Slack, and using cloud browser providers.

  ## Load the native CLI skill first

  The authoritative docs ship with the installed CLI and are version-matched to its commands. Before running browser commands, load them from the CLI instead of guessing from memory:

  ```bash
  agent-browser skills get core --full
  ```

  If the CLI says `Skill not found: core` but the Droid-native bundle is present, point the CLI at it and retry:

  ```bash
  export AGENT_BROWSER_SKILLS_DIR="$HOME/.factory/tools/agent-browser/skill-data"
  agent-browser skills get core --full
  ```

  If `agent-browser` is missing, install it first:

  ```bash
  npm i -g agent-browser
  agent-browser install
  ```

  If global install is unavailable, use `npx agent-browser ...`, but prefer the direct `agent-browser` binary when present.

  ## Core loop

  ```bash
  agent-browser open <url>
  agent-browser snapshot -i
  agent-browser click @e3
  agent-browser snapshot -i
  ```

  Refs such as `@e1` are assigned by each snapshot and become stale after navigation, clicks, form submissions, dialogs, or dynamic re-renders. Re-snapshot before the next ref interaction.

  ## Specialized native skills

  List available native guides when the task is not plain webpage automation:

  ```bash
  agent-browser skills list
  agent-browser skills get electron --full
  agent-browser skills get slack --full
  agent-browser skills get dogfood --full
  agent-browser skills get agentcore --full
  agent-browser skills get vercel-sandbox --full
  ```

  Use the specialized guide when the user asks for Electron app automation, Slack automation, exploratory QA/dogfooding, AWS Bedrock AgentCore cloud browsers, or Vercel Sandbox browser automation.

  ## Operating rules

  - Prefer accessibility snapshots (`snapshot -i`) over scraping raw HTML.
  - Use snapshot refs (`@eN`) for interactions when available; otherwise use selectors or locator helpers from the native guide.
  - Capture screenshots or recordings when evidence matters for QA, bug reports, or visual verification.
  - Close sessions with `agent-browser close` or `agent-browser close --all` when done.
  - Do not enter secrets unless the user explicitly provides them for the task; ask for OTP/MFA codes when required.
